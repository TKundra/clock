# Custom bare-metal target. It's the built-in `x86_64-unknown-none` spec but
# built as a NON-PIE, statically-relocated ET_EXEC (linked at 0x200000) with no
# RELRO. The `bootloader` 0.9 crate can't map a position-independent kernel
# (its load segment sits at vaddr 0x0), so this override is required.
[build]
target = "x86_64-clock.json"

# No precompiled `core` exists for a custom target, so build it from source.
# `compiler-builtins-mem` supplies memcpy/memset etc. that `core` relies on.
[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
# Recent nightlies gate custom `.json` target specs behind this flag.
json-target-spec = true

# `cargo run` hands the built ELF to `bootimage`, which wraps it in a bootable
# disk image and launches QEMU. Table key = the target file's stem.
[target.x86_64-clock]
runner = "bootimage runner"
